<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — SecureMail</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="index.css" />
  <script src="config.js"></script>
  <script src="lucide.min.js"></script>
  <script src="ui-helpers.js"></script>
</head>
<body class="auth-screen auth-screen-login">

  <div class="auth-card auth-card-animated login-card" role="main">
    <div class="auth-logo-area" style="text-align: center; margin-bottom: 30px;">
      <div class="neu-card" style="width: 64px; height: 64px; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; background: white;">
        <i data-lucide="shield-check" style="width: 32px; height: 32px; color: var(--g-blue);"></i>
      </div>
      <h1 class="auth-wordmark">Secure<em>Mail</em></h1>
      <p style="color:var(--text-secondary); font-size:14px; margin-top:4px;">Sign in to your private workspace</p>
    </div>

    <div class="lockout-banner" id="lockout-banner" role="alert">
      <i data-lucide="alert-circle" style="width:18px;height:18px; flex-shrink:0;"></i>
      Account locked. Retrying in <span id="lockout-countdown">30</span>s
    </div>

    <button type="button" id="google-login-btn" style="width:100%; display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 10px; height: 50px; padding: 0 20px;">
      <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.63-.06-1.25-.16-1.84H9v3.49h4.84a4.14 4.14 0 0 1-1.76 2.71v2.26h2.84c1.66-1.53 2.62-3.79 2.62-6.53z"/><path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.84-2.26c-.79.53-1.8.85-3.12.85-2.39 0-4.41-1.61-5.14-3.78H.9v2.33C2.38 15.11 5.44 18 9 18z"/><path fill="#FBBC05" d="M3.86 10.63a5.39 5.39 0 0 1 0-3.26V5.04H.9a8.99 8.99 0 0 0 0 7.92l2.96-2.33z"/><path fill="#EA4335" d="M9 3.58c1.32 0 2.5.45 3.44 1.35l2.58-2.59C13.47.89 11.43 0 9 0 5.44 0 2.38 2.89.9 5.04l2.96 2.33c.73-2.17 2.75-3.78 5.14-3.78z"/></svg>
      Sign in with Google
    </button>

    <div class="auth-divider">or use email</div>

    <form id="form-login" class="auth-form">
      <div class="auth-field">
        <label class="auth-label" for="login-email">Email Address</label>
        <input id="login-email" type="email" class="input" placeholder="name@company.com" required style="width:100%"/>
      </div>

      <div class="auth-field" style="margin-top: 15px;">
        <div style="display:flex; justify-content: space-between; align-items:center;">
          <label class="auth-label" for="login-password" style="margin-bottom:0">Password</label>
          <button type="button" id="forgot-password-btn" style="font-size:12px; color: var(--g-blue); border:none; background:none; cursor:pointer; font-weight:500;">Forgot?</button>
        </div>
        <input id="login-password" type="password" class="input" placeholder="••••••••" required style="width:100%; margin-top:8px;"/>
      </div>

      <div id="login-error" style="display:none; color: var(--g-red); font-size:13px; text-align:center; margin-top:10px;"></div>

      <button type="submit" id="login-btn" class="btn-primary" style="width:100%; margin-top: 25px; height: 50px; border:none; cursor:pointer; font-size:15px; font-family:var(--font-sans);">
        Sign In
      </button>
    </form>

    <div style="text-align:center; margin-top:30px;">
      <p style="font-size:14px; color:var(--text-secondary);">Don't have an account? <a href="register.html" style="color: var(--g-blue); font-weight: 600; text-decoration:none;">Sign up</a></p>
    </div>
  </div>

  <!-- Loader -->
  <div class="auth-loader-overlay" id="loader">
    <div style="text-align:center">
      <div class="neu-card" style="padding: 24px 40px; background: white;">
        <i data-lucide="loader" class="spin" style="width:32px; height:32px; color: var(--g-blue);"></i>
        <p style="margin-top:10px; font-weight:600; color:var(--text-primary);">Securely signing in…</p>
      </div>
    </div>
  </div>

  <!-- External auth script (no inline JS for CSP compliance) -->
  <script type="module" src="login-auth.js"></script>
</body>
</html>
