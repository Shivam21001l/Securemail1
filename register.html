<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account — SecureMail</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="index.css" />
  <script src="config.js"></script>
  <script src="lucide.min.js"></script>
  <script src="ui-helpers.js"></script>
</head>
<body class="auth-screen auth-screen-register">

  <div class="auth-card auth-card-animated register-card">
    <div class="auth-logo-area" style="text-align: center; margin-bottom: 25px;">
      <div class="neu-card" style="width: 56px; height: 56px; display: flex; align-items: center; justify-content: center; margin: 0 auto 12px; background: white;">
        <i data-lucide="user-plus" style="width: 28px; height: 28px; color: var(--g-green);"></i>
      </div>
      <h1 class="auth-wordmark">Secure<em>Mail</em></h1>
      <p style="color:var(--text-secondary); font-size:14px;">Create your encrypted workspace</p>
    </div>

    <!-- Google Step -->
    <div id="step-google">
      <button type="button" id="google-register-btn" style="width:100%; display: flex; align-items: center; justify-content: center; gap: 10px; height: 50px; padding: 0 20px;">
        <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.63-.06-1.25-.16-1.84H9v3.49h4.84a4.14 4.14 0 0 1-1.76 2.71v2.26h2.84c1.66-1.53 2.62-3.79 2.62-6.53z"/><path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.84-2.26c-.79.53-1.8.85-3.12.85-2.39 0-4.41-1.61-5.14-3.78H.9v2.33C2.38 15.11 5.44 18 9 18z"/><path fill="#FBBC05" d="M3.86 10.63a5.39 5.39 0 0 1 0-3.26V5.04H.9a8.99 8.99 0 0 0 0 7.92l2.96-2.33z"/><path fill="#EA4335" d="M9 3.58c1.32 0 2.5.45 3.44 1.35l2.58-2.59C13.47.89 11.43 0 9 0 5.44 0 2.38 2.89.9 5.04l2.96 2.33c.73-2.17 2.75-3.78 5.14-3.78z"/></svg>
        Sign up with Google
      </button>
    </div>

    <!-- Username Step (Google Only) -->
    <form id="step-username" style="display:none;">
      <p style="text-align:center; font-size:13px; margin-bottom:15px; color:var(--text-muted);">Pick a unique username for your SecureMail account.</p>
      <input id="reg-username" type="text" class="input" placeholder="satoshi" required style="width:100%" pattern="[A-Za-z0-9_]{3,20}"/>
      <div id="reg-error-username" style="display:none; color: var(--g-red); font-size:12px; margin-top:8px;"></div>
      <button type="submit" class="btn-primary" style="width:100%; margin-top:15px; height:48px; border:none; cursor:pointer; font-size:15px; font-family:var(--font-sans);">Complete Setup</button>
    </form>

    <div id="reg-divider" class="auth-divider">or use email</div>

    <!-- Email Form -->
    <form id="form-register" class="auth-form">
      <div class="auth-field">
        <label class="auth-label" for="reg-email">Email Address</label>
        <input id="reg-email" type="email" class="input" placeholder="you@example.com" required style="width:100%"/>
        <div id="username-preview" style="display:none; font-size:11px; color:var(--g-blue); margin-top:6px; font-weight:600;">
           Your ID: <span id="username-preview-val"></span>
        </div>
      </div>
      
      <div class="auth-field" style="margin-top:12px;">
        <label class="auth-label" for="reg-password">Password (min 10 chars)</label>
        <input id="reg-password" type="password" class="input" placeholder="SecurePass123!" required style="width:100%"/>
      </div>

      <div class="auth-field" style="margin-top:12px;">
        <label class="auth-label" for="reg-confirm">Confirm Password</label>
        <input id="reg-confirm" type="password" class="input" placeholder="••••••••" required style="width:100%"/>
      </div>

      <div id="reg-error" style="display:none; color: var(--g-red); font-size:12px; text-align:center; margin-top:10px;"></div>

      <button type="submit" id="register-btn" class="btn-primary" style="width:100%; margin-top:20px; height: 50px; border:none; cursor:pointer; font-size:15px; font-family:var(--font-sans);">
        Create Account
      </button>
    </form>

    <div style="text-align:center; margin-top:25px;">
      <p style="font-size:14px; color:var(--text-secondary);">Already joined? <a href="login.html" style="color: var(--g-blue); font-weight: 600; text-decoration:none;">Sign in</a></p>
    </div>
  </div>

  <!-- Progress Overlay -->
  <div id="progress-overlay" class="reg-progress-overlay">
    <div class="neu-card" style="width: 72px; height: 72px; display: flex; align-items: center; justify-content: center; background: white;">
      <i data-lucide="shield" style="width: 32px; height: 32px; color: var(--g-blue);"></i>
    </div>
    <h2 style="margin-top:24px; font-size:22px; color:var(--text-primary);">Securing Account</h2>
    <div class="reg-step-box">
      <div class="reg-step-item" id="step-1"><i data-lucide="circle-dashed" class="spin" id="spin-1" style="width:20px;height:20px;flex-shrink:0;"></i><i data-lucide="check-circle" id="check-1" style="display:none;width:20px;height:20px;flex-shrink:0;color:var(--g-green);"></i><span>Authenticating…</span></div>
      <div class="reg-step-item" id="step-2"><i data-lucide="circle-dashed" class="spin" id="spin-2" style="display:none;width:20px;height:20px;flex-shrink:0;"></i><i data-lucide="check-circle" id="check-2" style="display:none;width:20px;height:20px;flex-shrink:0;color:var(--g-green);"></i><span>Generating Encryption Keys…</span></div>
      <div class="reg-step-item" id="step-3"><i data-lucide="circle-dashed" class="spin" id="spin-3" style="display:none;width:20px;height:20px;flex-shrink:0;"></i><i data-lucide="check-circle" id="check-3" style="display:none;width:20px;height:20px;flex-shrink:0;color:var(--g-green);"></i><span>Securing Private Data…</span></div>
      <div class="reg-step-item" id="step-4"><i data-lucide="circle-dashed" class="spin" id="spin-4" style="display:none;width:20px;height:20px;flex-shrink:0;"></i><i data-lucide="check-circle" id="check-4" style="display:none;width:20px;height:20px;flex-shrink:0;color:var(--g-green);"></i><span>Finalizing…</span></div>
    </div>
  </div>

  <!-- External auth script (no inline JS for CSP compliance) -->
  <script type="module" src="register-auth.js"></script>
</body>
</html>
